# Builds the plugin and attaches the distribution zip to a published GitHub Release.
# This fork is not published to the JetBrains Marketplace; install by downloading the zip
# from the Releases page and using "Install Plugin from Disk..." in the IDE.

name: Release
on:
  release:
    types: [published]

jobs:

  release:
    name: Attach Plugin Zip
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      # Free GitHub Actions Environment Disk Space
      - name: Maximize Build Space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          large-packages: false

      # Check out the tag the release points at
      - name: Fetch Sources
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      # Set up the Java environment for the next steps
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      # Setup Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Build the plugin distribution zip
      - name: Build Plugin
        run: ./gradlew buildPlugin

      # Attach the built zip to the release as a downloadable asset
      - name: Upload Release Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" ./build/distributions/*.zip --clobber
