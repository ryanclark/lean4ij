# Fully automated release. On a push to main that changes gradle.properties, if the pluginVersion has no
# matching vX.Y.Z GitHub Release yet, build the plugin and publish the release with the zip attached and notes
# from the matching CHANGELOG section. Bumping pluginVersion + pushing is the entire release process; no drafts,
# no manual publish step.

name: Release
on:
  push:
    branches: [ main ]
    paths: [ 'gradle.properties' ]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish on version bump
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      # Free GitHub Actions Environment Disk Space
      - name: Maximize Build Space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          large-packages: false

      - name: Fetch Sources
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Read pluginVersion from gradle.properties (same extraction the old draft job used)
      - name: Read plugin version
        id: version
        run: |
          VERSION=$(./gradlew properties --property pluginVersion --quiet --console=plain | tail -n 1 | cut -f2- -d ' ')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Plugin version: $VERSION"

      # Skip everything below if a release for this version already exists (i.e. the version was not bumped)
      - name: Check for an existing release
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "v${{ steps.version.outputs.version }} already released; nothing to do."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build plugin
        if: steps.check.outputs.exists == 'false'
        run: ./gradlew buildPlugin

      - name: Publish release
        if: steps.check.outputs.exists == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES=$(awk "/^## \[$VERSION\]/{f=1;next} /^## \[/{f=0} f" CHANGELOG.md)
          gh release create "v$VERSION" \
            --repo "${{ github.repository }}" \
            --title "v$VERSION" \
            --notes "${NOTES:-Release v$VERSION}" \
            ./build/distributions/*.zip
